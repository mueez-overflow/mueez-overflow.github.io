<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abdul Mueez</title>
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,500;1,700&family=Nunito+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --font-display: 'Cormorant Garamond', serif;
  --font-body:    'Nunito Sans', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  --ease:         cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur:          0.38s;
}

[data-theme="dark"] {
  --bg:          #07090f;
  --bg-alt:      #0c0f1a;
  --surface:     #111522;
  --border:      rgba(255,255,255,0.07);
  --border-mid:  rgba(255,255,255,0.12);
  --text:        #e8e4dd;
  --text-muted:  #7a7871;
  --text-faint:  rgba(232,228,221,0.35);
  --nav-bg:      rgba(7,9,15,0.88);
  --accent:      #5b77ff;
  --accent-rgb:  91,119,255;
  --accent-dim:  rgba(91,119,255,0.12);
  --accent2:     #ff7849;
  --card-bg:     #0f1321;
  --card-hover:  #141828;
  --shadow:      rgba(0,0,0,0.5);
}

[data-theme="light"] {
  --bg:          #f6f4f0;
  --bg-alt:      #eceae5;
  --surface:     #e6e3dc;
  --border:      rgba(0,0,0,0.07);
  --border-mid:  rgba(0,0,0,0.14);
  --text:        #0a0c12;
  --text-muted:  #6a6762;
  --text-faint:  rgba(10,12,18,0.3);
  --nav-bg:      rgba(246,244,240,0.9);
  --accent:      #2d47d4;
  --accent-rgb:  45,71,212;
  --accent-dim:  rgba(45,71,212,0.08);
  --accent2:     #d45022;
  --card-bg:     #eeece8;
  --card-hover:  #e8e5e0;
  --shadow:      rgba(0,0,0,0.10);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 17px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 400;
  line-height: 1.75;
  overflow-x: hidden;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

img { display: block; max-width: 100%; }
a  { color: inherit; text-decoration: none; }
strong { font-weight: 600; }

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 max(3rem, calc((100% - 1100px) / 2)); height: 64px;
  border-bottom: 1px solid transparent;
  transition: background var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              backdrop-filter var(--dur) var(--ease);
}
.nav.is-scrolled {
  background: var(--nav-bg);
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  border-color: var(--border);
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
  transition: opacity 0.2s;
}
.nav-logo:hover { opacity: 0.7; }

.nav-links {
  display: flex; gap: 2.25rem; list-style: none;
}
.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  position: relative;
  padding-bottom: 2px;
  transition: color 0.2s;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--accent);
  transition: width 0.3s var(--ease);
}
.nav-links a:hover { color: var(--text); }
.nav-links a:hover::after { width: 100%; }

.nav-actions {
  display: flex; align-items: center; gap: 0.75rem;
}

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  transition: border-color 0.2s, color 0.2s, transform 0.2s var(--ease-spring);
}
.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(1.08);
}

/* Hamburger */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; }
.hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: var(--text-muted);
  transition: all 0.3s var(--ease);
  transform-origin: center;
}
.hamburger.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.is-open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* Mobile menu overlay */
.mobile-menu {
  position: fixed; inset: 0; z-index: 190;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s var(--ease);
}
.mobile-menu.is-open { opacity: 1; pointer-events: all; }
.mobile-menu a {
  font-family: var(--font-display);
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: 600;
  color: var(--text-muted);
  transition: color 0.2s;
}
.mobile-menu a:hover { color: var(--accent); }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 4rem;
  align-items: center;
  padding: 8rem max(3rem, calc((100% - 1100px) / 2)) 6rem;
  position: relative;
  overflow: hidden;
}

/* Ambient background orbs */
.hero-orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(100px);
}
.hero-orb-1 {
  width: 600px; height: 600px;
  background: rgba(var(--accent-rgb), 0.07);
  top: -200px; left: -200px;
  animation: drift 18s ease-in-out infinite alternate;
}
.hero-orb-2 {
  width: 400px; height: 400px;
  background: rgba(var(--accent-rgb), 0.04);
  bottom: -100px; right: 100px;
  animation: drift 24s ease-in-out infinite alternate-reverse;
}

@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(60px, 40px) scale(1.1); }
}

.hero-content { position: relative; z-index: 2; }

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.25rem;
  opacity: 0;
  animation: fade-up 0.7s 0.1s var(--ease) forwards;
}

.hero-name {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 6.5vw, 6.5rem);
  font-weight: 700;
  line-height: 0.92;
  letter-spacing: -0.02em;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fade-up 0.8s 0.25s var(--ease) forwards;
}
.hero-name em {
  font-style: italic;
  font-weight: 500;
  color: var(--text-muted);
}

.hero-bio {
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 500px;
  line-height: 1.8;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fade-up 0.8s 0.4s var(--ease) forwards;
}

/* Hero link buttons */
.hero-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fade-up 0.8s 0.55s var(--ease) forwards;
}

.btn {
  display: inline-flex; align-items: center; gap: 0.45rem;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.6rem 1.2rem;
  border: 1px solid var(--border-mid);
  color: var(--text-muted);
  position: relative; overflow: hidden;
  transition: color 0.25s, border-color 0.25s;
  white-space: nowrap;
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent);
  transform: translateX(-102%);
  transition: transform 0.3s var(--ease);
  z-index: -1;
}
.btn:hover { color: #fff; border-color: var(--accent); }
.btn:hover::before { transform: translateX(0); }

/* btn-primary background styles removed to only highlight on hover */
.btn-primary { }
.btn-primary::before { }

/* Email row */
.hero-emails {
  display: flex;
  flex-wrap: wrap;
  gap: 1.25rem;
  opacity: 0;
  animation: fade-up 0.8s 0.65s var(--ease) forwards;
}
.hero-email-link {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  border-bottom: 1px solid var(--border-mid);
  padding-bottom: 1px;
  transition: color 0.2s, border-color 0.2s;
}
.hero-email-link:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* Hero visual (right side) */
.hero-visual {
  position: relative; z-index: 2;
  opacity: 0;
  animation: fade-in 1s 0.5s var(--ease) forwards;
}
.hero-img-frame {
  position: relative;
  aspect-ratio: 4/5;
  overflow: hidden;
}
.hero-img-frame::before {
  content: '';
  position: absolute; inset: 0;
  border: 1px solid var(--border-mid);
  z-index: 2;
  pointer-events: none;
}
.hero-img-frame::after {
  content: '';
  position: absolute;
  top: 10px; left: 10px; right: -10px; bottom: -10px;
  border: 1px solid rgba(var(--accent-rgb), 0.3);
  z-index: 0;
  transition: all 0.4s var(--ease);
}
.hero-img-frame:hover::after {
  top: 14px; left: 14px; right: -14px; bottom: -14px;
}
.hero-img-frame img {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
}
.hero-quote {
  margin-top: 1.5rem;
  padding: 1rem 1.25rem;
  border-left: 2px solid rgba(var(--accent-rgb), 0.4);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-muted);
  line-height: 1.6;
  transition: border-color 0.3s;
}
.hero-quote:hover { border-color: var(--accent); }

/* ═══════════════════════════════════════════
   SECTION SHARED
═══════════════════════════════════════════ */
.section { padding: 7rem max(3rem, calc((100% - 1100px) / 2)); }
.section-alt { background: var(--bg-alt); }

.section-header { margin-bottom: 4rem; }

.section-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.section-label::before {
  content: attr(data-num);
  opacity: 0.5;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 4.5vw, 4.5rem);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: -0.02em;
}
.section-title em {
  font-style: italic;
  font-weight: 500;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════ */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.65s var(--ease), transform 0.65s var(--ease);
}
.reveal.is-visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }

/* ═══════════════════════════════════════════
   PUBLICATIONS
═══════════════════════════════════════════ */
.pub-list { display: flex; flex-direction: column; }

.pub-item {
  padding: 2rem 0;
  border-bottom: 1px solid var(--border);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
}
.pub-item.is-visible { opacity: 1; transform: translateY(0); }
.pub-item:first-child { border-top: 1px solid var(--border); }

.pub-status {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.2rem 0.65rem;
  border: 1px solid;
  margin-bottom: 0.6rem;
}
.pub-status::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.pub-status.review   { color: #f59e0b; border-color: rgba(245,158,11,0.35); }
.pub-status.revision { color: #d4a017; border-color: rgba(212,160,23,0.35); }
.pub-status.accepted { color: #22c55e; border-color: rgba(34,197,94,0.35); }
.pub-status.published { color: var(--accent); border-color: rgba(var(--accent-rgb),0.35); }

.pub-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 0.4rem;
  color: var(--text);
}

.pub-authors {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
  line-height: 1.5;
}

.pub-venue {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  letter-spacing: 0.02em;
}

.pub-link {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid rgba(var(--accent-rgb), 0.3);
  padding-bottom: 1px;
  transition: border-color 0.2s;
}
.pub-link:hover { border-color: var(--accent); }

/* ═══════════════════════════════════════════
   PROJECTS
═══════════════════════════════════════════ */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.project-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 2rem;
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.55s var(--ease), transform 0.55s var(--ease),
              background 0.25s, border-color 0.25s;
}
.project-card.is-visible { opacity: 1; transform: translateY(0); }
.project-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s var(--ease);
}
.project-card:hover { background: var(--card-hover); border-color: var(--border-mid); }
.project-card:hover::before { transform: scaleX(1); }

.project-year {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--text-faint);
  margin-bottom: 0.75rem;
}

.project-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1.15;
  margin-bottom: 0.75rem;
  color: var(--text);
}

.project-desc {
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.75;
  flex: 1;
  margin-bottom: 1.5rem;
}

.project-tags {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-bottom: 1.5rem;
}
.project-tag {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.55rem;
  border: 1px solid var(--border-mid);
  color: var(--text-muted);
}

.project-cta {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  transition: gap 0.2s var(--ease-spring);
}
.project-cta:hover { gap: 0.65rem; }

/* ═══════════════════════════════════════════
   TIMELINE (Experience & Education)
═══════════════════════════════════════════ */
.timeline { position: relative; }
.timeline::before {
  content: '';
  position: absolute; left: 0; top: 4px; bottom: 0;
  width: 1px; background: var(--border);
}

.timeline-item {
  position: relative;
  padding: 0 0 3rem 2.25rem;
  opacity: 0; transform: translateX(-16px);
  transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
}
.timeline-item.is-visible { opacity: 1; transform: translateX(0); }
.timeline-item:last-child { padding-bottom: 0; }

.timeline-item::before {
  content: '';
  position: absolute; left: -4px; top: 5px;
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  background: var(--bg);
  transition: background 0.2s;
}
.timeline-item:hover::before { background: var(--accent); }

.timeline-date {
  font-family: var(--font-mono);
  font-size: 0.67rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.35rem;
}

.timeline-role {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.2rem;
}

.timeline-org {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.8rem;
  font-style: italic;
}

.timeline-desc {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 0.4rem;
}

.timeline-bullets {
  list-style: none;
  display: flex; flex-direction: column; gap: 0.3rem;
}
.timeline-bullets li {
  font-size: 0.83rem;
  color: var(--text-muted);
  line-height: 1.65;
  padding-left: 1.1rem;
  position: relative;
}
.timeline-bullets li::before {
  content: '↳';
  position: absolute; left: 0;
  color: rgba(var(--accent-rgb), 0.5);
  font-size: 0.7rem;
  top: 0.25em;
}
.timeline-bullets li a {
  color: var(--text-muted);
  border-bottom: 1px solid rgba(var(--accent-rgb), 0.3);
  transition: color 0.2s, border-color 0.2s;
}
.timeline-bullets li a:hover { color: var(--accent); border-color: var(--accent); }
.timeline-desc a {
  color: var(--text-muted);
  border-bottom: 1px solid rgba(var(--accent-rgb), 0.3);
  transition: color 0.2s, border-color 0.2s;
}
.timeline-desc a:hover { color: var(--accent); border-color: var(--accent); }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
.footer {
  border-top: 1px solid var(--border);
  padding: 2rem max(3rem, calc((100% - 1100px) / 2));
  display: flex; align-items: center;
  justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.footer-left {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}
.footer-right {
  display: flex; gap: 1.5rem;
}
.footer-right a {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  transition: color 0.2s;
}
.footer-right a:hover { color: var(--text); }

/* ═══════════════════════════════════════════
   LOAD ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 980px) {
  .hero { grid-template-columns: 1fr; }
  .hero-visual { display: none; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
}

@media (max-width: 768px) {
  .nav { padding: 0 1.5rem; }

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

/* ═══════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════ */

/* ─── THEME ─── */
const root  = document.documentElement;
const themeBtn = document.getElementById('themeBtn');

function setTheme(t) {
  root.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀' : '☽';
}

// Boot: strictly use system pref
const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
setTheme(mediaQuery.matches ? 'dark' : 'light');

// Follow OS changes directly
mediaQuery.addEventListener('change', e => {
  setTheme(e.matches ? 'dark' : 'light');
});

themeBtn.addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  setTheme(next);
});

/* ─── HAMBURGER / MOBILE MENU ─── */
const hamburger  = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

function toggleMenu(open) {
  hamburger.classList.toggle('is-open', open);
  mobileMenu.classList.toggle('is-open', open);
  mobileMenu.setAttribute('aria-hidden', String(!open));
  hamburger.setAttribute('aria-expanded', String(open));
  document.body.style.overflow = open ? 'hidden' : '';
}

hamburger.addEventListener('click', () => {
  toggleMenu(!hamburger.classList.contains('is-open'));
});

mobileMenu.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => toggleMenu(false));
});

/* ─── SCROLLED NAV ─── */
const navEl = document.getElementById('nav');
window.addEventListener('scroll', () => {
  navEl.classList.toggle('is-scrolled', window.scrollY > 40);
}, { passive: true });

/* ─── SCROLL REVEALS ─── */
const io = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (!entry.isIntersecting) return;
    setTimeout(() => entry.target.classList.add('is-visible'), i * 70);
    io.unobserve(entry.target);
  });
}, { threshold: 0.1 });

document.querySelectorAll(
  '.reveal, .pub-item, .timeline-item, .project-card'
).forEach(el => io.observe(el));
</script>
